# .warren/config.yaml — per-project warren defaults
project: askmynotion
version: 1

# Force Warren to use your MiniMax model name by default
defaultRole: claude-code
defaultBranch: main
defaultProvider: anthropic
defaultModel: MiniMax-M3

# Ensure friendlier branch names
runBranchPrefix: warren

# Tell Warren how to test your specific project
qualityGate: "echo 'Skipping tests for bootstrap layer' && exit 0"